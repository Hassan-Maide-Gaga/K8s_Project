<form method="POST" action="{{ url_for('courses.assign_teacher', course_id=course.id) }}">
  <div class="mb-4">
    <label class="block text-sm font-semibold text-gray-700 mb-2">Sélectionner un enseignant</label>
    <select name="teacher_id" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-gold focus:ring-2 focus:ring-gold/20 transition-all">
      <option value="">— Aucun enseignant —</option>
      {% for t in teachers %}
      <option value="{{ t.id }}" {% if course.teacher_id == t.id %}selected{% endif %}>
        {{ t.name }} — {{ t.specialty }}
      </option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="px-4 py-2 bg-navy text-white rounded-lg hover:bg-navy/90 transition-all inline-flex items-center gap-2">
    <i class="fas fa-check"></i> Assigner
  </button>
</form>
